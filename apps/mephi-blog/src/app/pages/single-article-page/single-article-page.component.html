<header>
  <div class="text-container mx-auto p-4 sm:px-0">
    <div>
      <img
        class="rounded-full w-10"
        src="http://127.0.0.1:8090/api/files/jsgjjnxyxd6s6ju/c1ef8312hkug9e4/mephi_green_lightweight_1_oh0rgkkd2j.jpeg"
        alt=""
      >
      <h2 class="text-2xl font-bold">
        <a routerLink="/">Сэм Булатов</a>
      </h2>
      <nav class="flex gap-2">
        <a href="">Статьи</a>
        <a href="">Метки</a>
      </nav>
    </div>
  </div>
</header>

<main>
  <div class="container mx-auto px-4 sm:px-0">
    @if(isEmptyArticle()) {
      <p>Статья не загрузилась</p>
    } @else {
      <h1 class="text-4xl font-bold">{{title()}}</h1>

      <div class="prose dark:prose-invert" [innerHTML]="content()"></div>
    }
  </div>
</main>
